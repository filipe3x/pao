# Vhost HTTPS — depois do Certbot.
#
# O Certbot cria este ficheiro com o mínimo necessário. Substituir o conteúdo
# original por este, mantendo apenas as linhas SSLCertificate* que o Certbot
# já tem (paths exactos por domínio).
#
# Copiar para: /etc/apache2/sites-available/pao.brasume.com-le-ssl.conf
# Confirmar com: apache2ctl configtest && systemctl reload apache2

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName pao.brasume.com
    ServerAdmin webmaster@brasume.com

    Protocols h2 http/1.1

    # === Reverse proxy para o Node em :3000 ===
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 60

    # WebSocket upgrade (barato deixar pronto, mesmo que ainda não usemos)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

    <Location />
        ProxyPass         http://127.0.0.1:3000/  retry=0
        ProxyPassReverse  http://127.0.0.1:3000/
    </Location>

    # === Compressão ===
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE \
            text/html text/plain text/css text/xml \
            application/javascript application/json \
            application/xml image/svg+xml font/woff2
    </IfModule>

    # === Cache estática agressiva (Vite gera hashes nos ficheiros) ===
    <LocationMatch "^/assets/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # === Headers de segurança ===
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    # CSP minimalista — ajustar se entrar Sentry/Plausible/etc.
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; script-src 'self'; connect-src 'self'"

    ErrorLog  ${APACHE_LOG_DIR}/pao.ssl.error.log
    CustomLog ${APACHE_LOG_DIR}/pao.ssl.access.log combined

    # === TLS — gerido pelo Certbot ===
    SSLCertificateFile      /etc/letsencrypt/live/pao.brasume.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/pao.brasume.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
