# Vhost inicial (porta 80) — necessário para o desafio HTTP-01 do Certbot.
# Depois de correr `certbot --apache -d pao.brasume.com`, o Certbot:
#   - cria o ficheiro pao.brasume.com-le-ssl.conf (ver vizinho)
#   - reescreve este vhost para redireccionar para HTTPS
#
# Copiar para: /etc/apache2/sites-available/pao.brasume.com.conf
# Activar com: a2ensite pao.brasume.com && systemctl reload apache2

<VirtualHost *:80>
    ServerName pao.brasume.com
    ServerAdmin webmaster@brasume.com

    DocumentRoot /var/www/html

    ProxyPreserveHost On
    ProxyRequests Off
    <Location />
        ProxyPass         http://127.0.0.1:3000/
        ProxyPassReverse  http://127.0.0.1:3000/
    </Location>

    ErrorLog  ${APACHE_LOG_DIR}/pao.error.log
    CustomLog ${APACHE_LOG_DIR}/pao.access.log combined
</VirtualHost>
